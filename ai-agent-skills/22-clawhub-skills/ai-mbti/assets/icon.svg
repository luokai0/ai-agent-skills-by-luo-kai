<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mirror" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <rect x="30" y="20" width="60" height="80" rx="12" fill="url(#mirror)" opacity="0.9"/>
  <line x1="60" y1="25" x2="60" y2="95" stroke="#764ba2" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="60" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#333">🪞</text>
</svg>
